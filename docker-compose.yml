# Docker Compose para desarrollo local: broker MQTT (Eclipse Mosquitto)
# Uso: docker compose up -d
# MQTT disponible en localhost:1883 (TCP)

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: notification-service-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    command: mosquitto -c /mosquitto/config/mosquitto.conf
